# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# Use `pre-commit autoupdate` to update dependencies.
default_language_version:
  python: python3.13
repos:
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [ "--py313-plus" ]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
        args:
          - --unsafe
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-ast
      - id: debug-statements
      - id: check-merge-conflict
      - id: requirements-txt-fixer
        exclude: ^infra/requirements/.*\.txt$ # Exclude compiled reqs files
      - id: check-json

  - repo: local
    hooks:
      - id: sort-requirements-in
        name: sort requirements .in
        entry: python scripts/sort_requirements_in.py
        language: python
        files: ^infra/requirements/.*\.in$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args:
          - --fix

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/myint/autoflake
    rev: v2.3.3
    hooks:
      - id: autoflake
        args: [ --remove-all-unused-imports, --remove-unused-variables ]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        args: [
          "--install-types",
          "--non-interactive",
          "--config-file=mypy.ini"
        ]
        exclude: ^(tests/|migrations/|scripts/)
        additional_dependencies:
          - fastapi==0.136.0
          - pydantic==2.13.2
          - sqlalchemy==2.0.49
          - celery==5.6.3
          - PyJWT==2.12.1
          - sentry-sdk==2.58.0
          - pydantic-settings==2.13.1
          - redis==7.4.0
          - pytest==9.0.3
          - alembic==1.18.4
          - fastapi-mail==1.6.2
          - types-passlib==1.7.7.20260211
          - types-PyYAML==6.0.12.20260408
          - types-requests==2.33.0.20260408
          - types-ujson==5.10.0.20250822
