name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            infra/requirements/base.txt
            infra/requirements/dev.txt
            infra/requirements/prod.txt
            infra/requirements.txt

      - name: Create venv and install deps
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install -r infra/requirements.txt

      - name: Create .env file from .env.example
        run: cp .env.example .env

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      - name: Run linter
        shell: bash
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          make check-lint

      - name: Check migration HEADs
        run: |
          export PYTHONPATH=$(pwd)
          echo "--- Alembic heads ---"
          ./.venv/bin/alembic heads
          HEADS_COUNT=$(.venv/bin/alembic heads | wc -l)
          if [ "$HEADS_COUNT" -gt 1 ]; then
            echo "❌ ERROR: Multiple Alembic heads detected ($HEADS_COUNT)."
            exit 1
          else
            echo "✅ OK: Only one Alembic head found."
          fi

      - name: Run unit tests with coverage
        shell: bash
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          make test-cov

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          format: cobertura
          file: coverage.xml

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            infra/requirements/base.txt
            infra/requirements/dev.txt
            infra/requirements/prod.txt
            infra/requirements.txt

      - name: Install security tooling
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit==1.9.4 pip-audit==2.10.0

      - name: Run Bandit
        shell: bash
        run: |
          bandit -r src scripts migrations -q

      - name: Audit pinned dependencies
        shell: bash
        run: |
          # Temporary suppression for pygments==2.19.2, pulled only via pytest in
          # infra/requirements/dev.txt. As of March 26, 2026, pip-audit reports
          # CVE-2026-4539 with no released fix version yet; the upstream fix was
          # merged on March 25, 2026 in pygments/pygments#3064:
          # https://github.com/pygments/pygments/issues/3058
          # https://github.com/pygments/pygments/pull/3064
          # Re-check on the next dependency refresh and remove this ignore once a
          # Pygments release newer than 2.19.2 is available.
          pip-audit \
            --ignore-vuln CVE-2026-4539 \
            -r infra/requirements/base.txt \
            -r infra/requirements/dev.txt \
            -r infra/requirements/prod.txt

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
