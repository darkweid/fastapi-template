name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            infra/requirements/base.txt
            infra/requirements/dev.txt
            infra/requirements/prod.txt
            infra/requirements.txt

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('infra/requirements.txt', 'infra/requirements/dev.txt') }}

      - name: Create venv and install deps
        if: steps.cache-venv.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install -r infra/requirements.txt

      - name: Create .env file from .env.example
        run: cp .env.example .env

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      - name: Run linter
        shell: bash
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          make check-lint

  migration-heads:
    name: Migration HEADs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            infra/requirements/base.txt
            infra/requirements/prod.txt

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('infra/requirements/prod.txt') }}

      - name: Create venv and install deps
        if: steps.cache-venv.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install -r infra/requirements/prod.txt

      - name: Create .env file from .env.example
        run: cp .env.example .env

      - name: Check migration HEADs
        shell: bash
        run: |
          export PYTHONPATH=$(pwd)
          echo "--- Alembic heads ---"
          ./.venv/bin/alembic heads
          HEADS_COUNT=$(.venv/bin/alembic heads | wc -l)
          if [ "$HEADS_COUNT" -gt 1 ]; then
            echo "ERROR: Multiple Alembic heads detected ($HEADS_COUNT)."
            exit 1
          else
            echo "OK: Only one Alembic head found."
          fi

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            infra/requirements/base.txt
            infra/requirements/dev.txt
            infra/requirements/prod.txt
            infra/requirements.txt

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('infra/requirements.txt', 'infra/requirements/dev.txt') }}

      - name: Create venv and install deps
        if: steps.cache-venv.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install -r infra/requirements.txt

      - name: Create .env file from .env.example
        run: cp .env.example .env

      - name: Run unit tests with coverage
        shell: bash
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          make test-cov

      - name: Upload coverage to Coveralls
        continue-on-error: true
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          format: cobertura
          file: coverage.xml

  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Bandit
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit==1.9.4

      - name: Run Bandit
        shell: bash
        run: bandit -r src scripts migrations -q

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            infra/requirements/base.txt
            infra/requirements/dev.txt
            infra/requirements/prod.txt

      - name: Install pip-audit
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.10.0

      - name: Audit pinned dependencies
        shell: bash
        run: |
          pip-audit \
            -r infra/requirements/base.txt \
            -r infra/requirements/dev.txt \
            -r infra/requirements/prod.txt

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
